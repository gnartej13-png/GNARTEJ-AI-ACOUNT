<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GNARTEJ AI - Premium UI</title>
    <style>
        /* --- TU PALETA DE COLORES PREMIUM --- */
        :root {
            --bg-principal: #0b0b0d;
            --bg-chat: #111114;
            --bg-cabecera: #16161a;
            --bg-tarjeta: #111114;
            --bg-item: #111114;
            --bg-item-hover: #16161a;
            --texto-principal: #f3f4f6;
            --texto-secundario: #9ca3af;
            --borde: #1f2937;
            --borde-fuerte: #374151;
            --verde-fosforito: #00ff99;
            --ai-msg-bg: #16161a;
            --ai-msg-texto: #e5e7eb;
            --bg-modal-overlay: rgba(11, 11, 13, 0.95);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        html, body {
            background-color: var(--bg-principal);
            color: var(--texto-principal);
            height: 100vh;
            width: 100%;
            overflow: hidden;
        }

        /* PANTALLA DE CARGA (ANTI-BLOQUEO) */
        #loading-screen {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-color: #0b0b0d;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 20px;
            transition: opacity 0.5s ease;
        }

        .spinner {
            width: 50px; height: 50px;
            border: 3px solid #1f2937;
            border-top: 3px solid var(--verde-fosforito);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .app-container {
            display: flex;
            width: 100%;
            height: 100vh;
            overflow: hidden;
        }

        /* CABECERA CON MENÚ DE CÁPSULAS (TU FOTO) */
        .chat-header {
            background-color: var(--bg-cabecera);
            padding: 10px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--borde);
            height: 70px;
        }

        .chat-header h2 {
            font-size: 20px;
            font-weight: 700;
            color: var(--verde-fosforito);
            letter-spacing: 1px;
        }

        .capsule-nav {
            display: flex;
            background-color: #000000;
            border: 1px solid var(--borde);
            border-radius: 50px;
            padding: 4px;
            gap: 4px;
        }

        .capsule-btn {
            background: none;
            border: none;
            padding: 8px 18px;
            border-radius: 50px;
            color: var(--texto-secundario);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s ease;
        }

        .capsule-btn:hover {
            color: var(--texto-principal);
        }

        .capsule-btn.active {
            background-color: var(--verde-fosforito) !important;
            color: #000000 !important;
        }

        /* CUERPO PRINCIPAL */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background-color: var(--bg-chat);
        }

        .chat-messages {
            flex: 1;
            padding: 24px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .message {
            padding: 14px 18px;
            border-radius: 14px;
            max-width: 75%;
            font-size: 15px;
            line-height: 1.5;
        }

        .user-message {
            background-color: var(--verde-fosforito);
            color: #000;
            align-self: flex-end;
            border-bottom-right-radius: 2px;
        }

        .ai-message {
            background-color: var(--ai-msg-bg);
            color: var(--ai-msg-texto);
            align-self: flex-start;
            border: 1px solid var(--borde);
            border-bottom-left-radius: 2px;
        }

        /* INPUT AREA (SCROLL H VS ESTIRAR) */
        .chat-input-container {
            padding: 20px 24px;
            background-color: var(--bg-cabecera);
            border-top: 1px solid var(--borde);
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }

        .input-wrapper {
            flex: 1;
            position: relative;
        }

        textarea {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            background-color: var(--bg-principal);
            border: 1px solid var(--borde);
            color: var(--texto-principal);
            font-size: 15px;
            outline: none;
            resize: none;
            height: 52px;
            transition: border-color 0.2s;
        }

        textarea:focus { border-color: var(--verde-fosforito); }

        /* Modos dinámicos */
        .mode-scroll {
            white-space: nowrap;
            overflow-x: auto;
            overflow-y: hidden;
        }

        .mode-estirar {
            white-space: pre-wrap;
            overflow-y: auto;
        }

        .btn-enviar {
            background-color: var(--verde-fosforito);
            color: #000;
            border: none;
            padding: 0 25px;
            height: 52px;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.1s;
        }

        .btn-enviar:active { transform: scale(0.96); }
        .btn-enviar:disabled { opacity: 0.5; cursor: not-allowed; }

        /* BARRA LATERAL DERECHA (CHATS) */
        .sidebar-right {
            width: 280px;
            background-color: var(--bg-principal);
            border-left: 1px solid var(--borde);
            display: flex;
            flex-direction: column;
        }

        .sidebar-top { padding: 20px; border-bottom: 1px solid var(--borde); }

        .btn-nuevo {
            width: 100%;
            padding: 12px;
            background-color: transparent;
            color: var(--verde-fosforito);
            border: 1px dashed var(--verde-fosforito);
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
        }

        .chats-list { flex: 1; overflow-y: auto; padding: 10px; }

        .chat-item {
            padding: 14px;
            margin-bottom: 8px;
            background-color: var(--bg-item);
            border-radius: 8px;
            border: 1px solid transparent;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-item.active { border-color: var(--verde-fosforito); background-color: var(--bg-item-hover); }

        .chat-item-text {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-size: 14px;
        }

        /* MODAL DE CUENTA */
        .modal-screen {
            display: none; position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: var(--bg-modal-overlay);
            z-index: 9999; justify-content: center; align-items: center;
        }

        .account-card {
            background-color: var(--bg-tarjeta);
            border: 1px solid var(--borde);
            border-radius: 20px;
            width: 90%; max-width: 400px;
            padding: 30px;
        }

        .auth-box input {
            width: 100%; padding: 14px; margin-bottom: 15px;
            background-color: var(--bg-principal); border: 1px solid var(--borde);
            border-radius: 8px; color: #fff; outline: none;
        }

        .btn-auth {
            width: 100%; padding: 14px; background-color: var(--verde-fosforito);
            border: none; border-radius: 8px; font-weight: 700; cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="loading-screen">
        <div class="spinner"></div>
        <h2 style="color: var(--verde-fosforito); font-size: 15px;">CONECTANDO CON RAILWAY...</h2>
    </div>

    <div id="account-screen" class="modal-screen">
        <div class="account-card">
            <div id="auth-ui-root">
                </div>
            <button onclick="cerrarModal()" style="width:100%; background:none; border:none; color:var(--texto-secundario); margin-top:15px; cursor:pointer;">Volver</button>
        </div>
    </div>

    <div class="app-container">
        <div class="chat-area">
            <div class="chat-header">
                <h2>GNARTEJ AI</h2>
                <div class="capsule-nav">
                    <button class="capsule-btn active" id="btn-nav-historial" onclick="setNav('historial')">💬 Historial</button>
                    <button class="capsule-btn" id="btn-nav-ajustes" onclick="setNav('ajustes')">⚙️ Ajustes</button>
                    <button class="capsule-btn" id="btn-nav-user" onclick="abrirModal()">👤 Vincular</button>
                </div>
            </div>

            <div class="chat-messages" id="chat-messages">
                <div class="message ai-message">Bienvenido. Inicia sesión para guardar tus chats en la nube.</div>
            </div>

            <div class="chat-input-container">
                <div class="input-wrapper">
                    <textarea id="chat-input" class="mode-scroll" placeholder="Escribe un mensaje..." onkeydown="manejarTeclado(event)" disabled></textarea>
                </div>
                <button class="btn-enviar" id="btn-enviar" onclick="enviarMensaje()" disabled>Enviar</button>
            </div>
        </div>

        <div class="sidebar-right">
            <div class="sidebar-top">
                <button class="btn-nuevo" id="btn-nuevo" onclick="nuevoChat()" disabled>+ Nuevo Chat</button>
            </div>
            <div class="chats-list" id="chats-list">
                </div>
        </div>
    </div>

    <script>
        let usuario = null;
        let idChatActivo = null;
        let modoInput = 'scroll'; // 'scroll' o 'estirar'
        let listaChats = [];

        const API_URL = "https://gnartej-api-production.up.railway.app";

        // --- LÓGICA DE UI ---
        function setNav(opcion) {
            document.querySelectorAll('.capsule-btn').forEach(b => b.classList.remove('active'));
            if(opcion === 'ajustes') {
                document.getElementById('btn-nav-ajustes').classList.add('active');
                abrirAjustes();
            } else {
                document.getElementById('btn-nav-historial').classList.add('active');
            }
        }

        function abrirAjustes() {
            const root = document.getElementById('auth-ui-root');
            root.innerHTML = `
                <h3 style="margin-bottom:15px;">Ajustes de Chateo</h3>
                <p style="font-size:13px; color:var(--texto-secundario); margin-bottom:10px;">Modo del cuadro de texto:</p>
                <div class="capsule-nav" style="background:#1a1a1f;">
                    <button class="capsule-btn ${modoInput==='scroll'?'active':''}" onclick="setModoInput('scroll')">Scroll H.</button>
                    <button class="capsule-btn ${modoInput==='estirar'?'active':''}" onclick="setModoInput('estirar')">Estirar</button>
                </div>
            `;
            abrirModal();
        }

        function setModoInput(modo) {
            modoInput = modo;
            const campo = document.getElementById('chat-input');
            campo.className = modo === 'scroll' ? 'mode-scroll' : 'mode-estirar';
            campo.style.height = '52px';
            abrirAjustes();
        }

        function abrirModal() { document.getElementById('account-screen').style.display = 'flex'; }
        function cerrarModal() { document.getElementById('account-screen').style.display = 'none'; }

        // --- CONEXIÓN BACKEND ---
        window.addEventListener('DOMContentLoaded', async () => {
            setTimeout(() => { document.getElementById('loading-screen').style.opacity = '0'; setTimeout(() => document.getElementById('loading-screen').style.display='none', 500); }, 2500);
            
            const cached = localStorage.getItem('gnartej_user');
            if(cached) {
                usuario = JSON.parse(cached);
                onUserConnected();
            } else {
                renderLoginUI();
            }
        });

        function renderLoginUI() {
            document.getElementById('auth-ui-root').innerHTML = `
                <h3 style="margin-bottom:20px; text-align:center;">Vincular Cuenta</h3>
                <div class="auth-box">
                    <input type="text" id="user-in" placeholder="Usuario">
                    <input type="password" id="pass-in" placeholder="Contraseña">
                    <button class="btn-auth" onclick="login()">Conectar Ahora</button>
                </div>
            `;
        }

        async function login() {
            const u = document.getElementById('user-in').value;
            const p = document.getElementById('pass-in').value;
            try {
                const res = await fetch(`${API_URL}/api/auth/login`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({username: u, password: p})
                });
                if(res.status === 401) {
                    // Intento registro automático
                    const reg = await fetch(`${API_URL}/api/auth/register`, {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({username: u, password: p})
                    });
                    usuario = await reg.json();
                } else {
                    usuario = await res.json();
                }
                localStorage.setItem('gnartej_user', JSON.stringify(usuario));
                onUserConnected();
                cerrarModal();
            } catch(e) { alert("Error de conexión"); }
        }

        function onUserConnected() {
            document.getElementById('btn-nav-user').innerText = `👤 ${usuario.username}`;
            document.getElementById('chat-input').disabled = false;
            document.getElementById('btn-enviar').disabled = false;
            document.getElementById('btn-nuevo').disabled = false;
            cargarHistorial();
        }

        async function cargarHistorial() {
            const res = await fetch(`${API_URL}/api/chats/${usuario._id}`);
            listaChats = await res.json();
            const list = document.getElementById('chats-list');
            list.innerHTML = "";
            listaChats.forEach(c => {
                const item = document.createElement('div');
                item.className = `chat-item ${idChatActivo === c._id ? 'active' : ''}`;
                item.onclick = () => selectChat(c._id);
                item.innerHTML = `<div class="chat-item-text">${c.titulo}</div><span onclick="event.stopPropagation(); borrarChat('${c._id}')">🗑️</span>`;
                list.appendChild(item);
            });
            if(listaChats.length > 0 && !idChatActivo) selectChat(listaChats[0]._id);
        }

        function selectChat(id) {
            idChatActivo = id;
            const chat = listaChats.find(c => c._id === id);
            const box = document.getElementById('chat-messages');
            box.innerHTML = "";
            chat.mensajes.forEach(m => {
                const d = document.createElement('div');
                d.className = `message ${m.role === 'user' ? 'user-message' : 'ai-message'}`;
                d.innerText = m.content;
                box.appendChild(d);
            });
            box.scrollTop = box.scrollHeight;
            cargarHistorial(); // Refresca clases active
        }

        async function nuevoChat() {
            const res = await fetch(`${API_URL}/api/chats/nuevo`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({userId: usuario._id})
            });
            const n = await res.json();
            idChatActivo = n._id;
            cargarHistorial();
            selectChat(n._id);
        }

        async function enviarMensaje() {
            const inp = document.getElementById('chat-input');
            const txt = inp.value.trim();
            if(!txt || !idChatActivo) return;

            inp.value = "";
            if(modoInput === 'estirar') inp.style.height = '52px';

            const box = document.getElementById('chat-messages');
            const uDiv = document.createElement('div');
            uDiv.className = "message user-message";
            uDiv.innerText = txt;
            box.appendChild(uDiv);

            const aiDiv = document.createElement('div');
            aiDiv.className = "message ai-message";
            aiDiv.innerText = "...";
            box.appendChild(aiDiv);
            box.scrollTop = box.scrollHeight;

            const res = await fetch(`${API_URL}/api/chat/${idChatActivo}`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({message: txt})
            });
            const data = await res.json();
            aiDiv.innerText = data.reply;
            box.scrollTop = box.scrollHeight;
            cargarHistorial();
        }

        function manejarTeclado(e) {
            if(e.key === 'Enter' && (modoInput === 'scroll' || !e.shiftKey)) {
                e.preventDefault();
                enviarMensaje();
            }
        }
    </script>
</body>
</html>
