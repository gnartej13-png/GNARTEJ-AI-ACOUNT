<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GNARTEJ AI</title>
    <style>
        :root {
            --bg-principal: #0b0b0d;
            --bg-chat: #111114;
            --bg-cabecera: #16161a;
            --bg-tarjeta: #111114;
            --bg-item: #111114;
            --bg-item-hover: #16161a;
            --texto-principal: #f3f4f6;
            --texto-secundario: #9ca3af;
            --borde: #1f2937;
            --borde-fuerte: #374151;
            --verde-fosforito: #00ff99;
            --ai-msg-bg: #16161a;
            --ai-msg-texto: #e5e7eb;
            --bg-modal-overlay: rgba(11, 11, 13, 0.95);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        html, body {
            background-color: var(--bg-principal);
            color: var(--texto-principal);
            height: 100vh;
            width: 100%;
            overflow: hidden;
        }

        #loading-screen {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-color: #0b0b0d;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 20px;
            transition: opacity 0.5s ease;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid #1f2937;
            border-top: 3px solid var(--verde-fosforito);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .app-container {
            display: flex;
            width: 100%;
            height: 100vh;
            overflow: hidden;
        }

        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100%;
            background-color: var(--bg-chat);
        }

        .chat-header {
            background-color: var(--bg-cabecera);
            padding: 20px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--borde);
        }

        .chat-header h2 {
            font-size: 18px;
            font-weight: 600;
            color: var(--verde-fosforito);
        }

        .header-controls {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .chat-status-badge {
            background-color: var(--bg-principal);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
            border: 1px solid var(--borde);
            cursor: pointer;
            color: var(--texto-principal);
        }

        .capsule-menu {
            background-color: var(--bg-principal);
            border: 1px solid var(--borde);
            border-radius: 20px;
            padding: 4px 12px;
            display: flex;
            gap: 10px;
            font-size: 12px;
            color: var(--texto-secundario);
        }

        .capsule-menu label {
            display: flex;
            align-items: center;
            gap: 4px;
            cursor: pointer;
        }

        .chat-messages {
            flex: 1;
            padding: 24px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .message {
            padding: 12px 16px;
            border-radius: 12px;
            max-width: 70%;
            word-wrap: break-word;
            line-height: 1.5;
            font-size: 15px;
        }

        .user-message {
            background-color: var(--verde-fosforito);
            color: #0b0b0d;
            align-self: flex-end;
            border-bottom-right-radius: 2px;
        }

        .ai-message {
            background-color: var(--ai-msg-bg);
            color: var(--ai-msg-texto);
            align-self: flex-start;
            border-bottom-left-radius: 2px;
            border: 1px solid var(--borde);
        }

        .chat-input-container {
            padding: 20px 24px;
            background-color: var(--bg-cabecera);
            display: flex;
            gap: 12px;
            border-top: 1px solid var(--borde);
            align-items: flex-end;
        }

        .chat-input-container textarea {
            flex: 1;
            padding: 14px;
            border-radius: 8px;
            border: 1px solid var(--borde);
            background-color: var(--bg-chat);
            color: var(--texto-principal);
            font-size: 15px;
            outline: none;
            resize: none;
            height: 50px;
            font-family: inherit;
        }

        .chat-input-container textarea.mode-scroll-horizontal {
            white-space: nowrap;
            overflow-x: auto;
            overflow-y: hidden;
        }

        .chat-input-container textarea.mode-estirar-borrador {
            white-space: pre-wrap;
            overflow-y: auto;
        }

        .chat-input-container textarea:focus {
            border-color: var(--verde-fosforito);
        }

        .chat-input-container button {
            background-color: var(--verde-fosforito);
            color: #0b0b0d;
            border: none;
            padding: 14px 24px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            font-size: 15px;
            height: 50px;
        }

        .chat-input-container textarea:disabled, .chat-input-container button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .sidebar-right {
            width: 260px;
            background-color: var(--bg-principal);
            border-left: 1px solid var(--borde);
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid var(--borde);
        }

        .btn-nuevo-chat {
            width: 100%;
            padding: 12px;
            background-color: transparent;
            color: var(--verde-fosforito);
            border: 1px dashed var(--verde-fosforito);
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
        }

        .chats-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .chat-item {
            padding: 12px;
            background-color: var(--bg-item);
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            border: 1px solid transparent;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-item:hover, .chat-item.active {
            background-color: var(--bg-item-hover);
            border-color: var(--borde);
        }

        .chat-item-text {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex: 1;
        }

        .btn-delete-chat {
            background: none;
            border: none;
            color: var(--texto-secundario);
            cursor: pointer;
            font-size: 14px;
        }

        .modal-screen {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-color: var(--bg-modal-overlay);
            z-index: 999;
            padding: 20px;
            align-items: center;
            justify-content: center;
        }

        .account-card {
            background-color: var(--bg-tarjeta);
            border: 1px solid var(--borde);
            border-radius: 12px;
            width: 100%;
            max-width: 400px;
            padding: 28px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .login-box-inside label {
            font-size: 14px;
            color: var(--texto-secundario);
            display: block;
            margin-bottom: 6px;
        }

        .login-box-inside input {
            width: 100%;
            padding: 12px;
            margin-bottom: 16px;
            background-color: var(--bg-principal);
            border: 1px solid var(--borde);
            color: var(--texto-principal);
            border-radius: 6px;
            outline: none;
        }

        .btn-logout-panel {
            width: 100%;
            padding: 12px;
            background-color: #ef4444;
            color: white;
            border: none;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
        }

        .btn-volver {
            background: none;
            border: 1px solid var(--borde);
            color: var(--texto-secundario);
            padding: 8px;
            border-radius: 6px;
            cursor: pointer;
        }

        .sidebar-login-prompt {
            padding: 20px;
            text-align: center;
            color: var(--texto-secundario);
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div id="loading-screen">
        <div class="spinner"></div>
        <h2 style="color: var(--verde-fosforito); font-size: 16px; font-weight: 500;">Iniciando entorno GNARTEJ...</h2>
    </div>

    <div id="account-screen" class="modal-screen">
        <div class="account-card">
            <div id="auth-modal-dinamico">
                <h3>Perfil Activo</h3>
                <div style="text-align: center; padding: 10px 0;">
                    <p style="font-weight: 600; font-size: 16px;" id="menu-user-username">Usuario</p>
                    <button class="btn-logout-panel" style="margin-top: 15px;" onclick="ejecutarCierreSesion()">Cerrar Sesión</button>
                </div>
            </div>
            <button class="btn-volver" onclick="cerrarPantallaCuenta()">Volver al Chat</button>
        </div>
    </div>

    <div class="app-container">
        <div class="chat-area">
            <div class="chat-header">
                <h2>GNARTEJ AI</h2>
                <div class="header-controls">
                    <div class="capsule-menu">
                        <label>
                            <input type="radio" name="input-mode" value="scroll" checked onclick="cambiarModoCuadroTexto()"> Scroll H.
                        </label>
                        <label>
                            <input type="radio" name="input-mode" value="estirar" onclick="cambiarModoCuadroTexto()"> Estirar borrador
                        </label>
                    </div>
                    <div id="btn-status-perfil" class="chat-status-badge" onclick="abrirPantallaCuenta()">
                        <span style="color: #ef4444;">●</span> Desconectado
                    </div>
                </div>
            </div>

            <div class="chat-messages" id="chat-box-messages">
                <div class="message ai-message">Por favor, inicia sesión para habilitar la experiencia completa con GNARTEJ AI.</div>
            </div>

            <div class="chat-input-container">
                <textarea id="chat-input-field" class="mode-scroll-horizontal" placeholder="Escribe un mensaje..." onkeydown="manejarEnvioTeclado(event)" disabled></textarea>
                <button id="chat-send-btn" onclick="enviarMensajeUsuario()" disabled>Enviar</button>
            </div>
        </div>

        <div class="sidebar-right">
            <div class="sidebar-header">
                <button id="btn-side-nuevo" class="btn-nuevo-chat" onclick="crearNuevaConversacion()" disabled>+ Nuevo Chat</button>
            </div>
            <div id="sidebar-dinamico-root" class="sidebar-login-prompt">
                <p>Inicia sesión para ver tu historial de chats.</p>
            </div>
        </div>
    </div>

    <script>
        let usuarioLogueado = null;
        let idChatActivo = null;
        let listaChatsGlobal = [];

        // URL ACTUALIZADA A TU BACKEND DE RAILWAY
        const RAILWAY_BACKEND_URL = "https://gnartej-api-production.up.railway.app";

        function cambiarModoCuadroTexto() {
            const campo = document.getElementById('chat-input-field');
            const modoSeleccionado = document.querySelector('input[name="input-mode"]:checked').value;
            
            if(modoSeleccionado === 'scroll') {
                campo.className = 'mode-scroll-horizontal';
                campo.style.height = '50px';
            } else {
                campo.className = 'mode-estirar-borrador';
                ajustarAlturaTextarea(campo);
            }
        }

        function ajustarAlturaTextarea(textarea) {
            if(!textarea.classList.contains('mode-estirar-borrador')) return;
            textarea.style.height = 'auto';
            textarea.style.height = Math.min(textarea.scrollHeight, 150) + 'px';
        }

        function manejarEnvioTeclado(event) {
            const modoSeleccionado = document.querySelector('input[name="input-mode"]:checked').value;
            if(event.key === 'Enter') {
                if(modoSeleccionado === 'scroll' || !event.shiftKey) {
                    event.preventDefault();
                    enviarMensajeUsuario();
                }
            }
        }

        document.getElementById('chat-input-field').addEventListener('input', function() {
            ajustarAlturaTextarea(this);
        });

        window.addEventListener('DOMContentLoaded', async () => {
            const desbanearPantallaTimer = setTimeout(() => {
                ocultarPantallaCargaDefinitiva();
            }, 3000);

            try {
                const res = await fetch(`${RAILWAY_BACKEND_URL}/health`);
                if(res.ok) clearTimeout(desbanearPantallaTimer);
            } catch (err) {
                console.error(err);
            } finally {
                ocultarPantallaCargaDefinitiva();
            }
            
            try {
                const cacheUser = localStorage.getItem('gnartej_user');
                if(cacheUser) {
                    usuarioLogueado = JSON.parse(cacheUser);
                    reestructurarInterfazUsuarioConectado();
                    await recargarHistorialChatsServidor();
                } else {
                    reestructurarInterfazDesconectado();
                }
            } catch (e) {
                reestructurarInterfazDesconectado();
            }
        });

        function ocultarPantallaCargaDefinitiva() {
            const loader = document.getElementById('loading-screen');
            if (loader) {
                loader.style.opacity = '0';
                setTimeout(() => loader.style.display = 'none', 400);
            }
        }

        function reestructurarInterfazDesconectado() {
            document.getElementById('btn-status-perfil').innerHTML = `<span style="color: #ef4444;">●</span> Desconectado`;
            document.getElementById('chat-input-field').disabled = true;
            document.getElementById('chat-send-btn').disabled = true;
            document.getElementById('btn-side-nuevo').disabled = true;
            
            document.getElementById('auth-modal-dinamico').innerHTML = `
                <h3 style="margin-bottom: 15px; text-align: center;">Iniciar Sesión / Registro</h3>
                <div class="login-box-inside">
                    <label>Usuario:</label>
                    <input type="text" id="username-input" placeholder="Introduce tu usuario...">
                    <label>Contraseña:</label>
                    <input type="password" id="password-input" placeholder="Introduce tu contraseña...">
                    <button id="btn-login-action" onclick="ejecutarAutenticacion()">Acceder o Registrarse</button>
                </div>
            `;
            document.getElementById('sidebar-dinamico-root').className = "sidebar-login-prompt";
            document.getElementById('sidebar-dinamico-root').innerHTML = `<p>Inicia sesión para ver tu historial de chats.</p>`;
        }

        function reestructurarInterfazUsuarioConectado() {
            if (!usuarioLogueado) return;
            document.getElementById('btn-status-perfil').innerHTML = `<span style="color: var(--verde-fosforito);">●</span> Conectado`;
            document.getElementById('chat-input-field').disabled = false;
            document.getElementById('chat-send-btn').disabled = false;
            document.getElementById('btn-side-nuevo').disabled = false;

            document.getElementById('auth-modal-dinamico').innerHTML = `
                <h3>Perfil Activo</h3>
                <div style="text-align: center; padding: 10px 0;">
                    <p style="font-weight: 600; font-size: 16px;">${usuarioLogueado.name || usuarioLogueado.username}</p>
                    <button class="btn-logout-panel" style="margin-top: 15px;" onclick="ejecutarCierreSesion()">Cerrar Sesión</button>
                </div>
            `;
        }

        function abrirPantallaCuenta() { document.getElementById('account-screen').style.display = 'flex'; }
        function cerrarPantallaCuenta() { document.getElementById('account-screen').style.display = 'none'; }

        async function recargarHistorialChatsServidor() {
            if(!usuarioLogueado) return;
            try {
                const res = await fetch(`${RAILWAY_BACKEND_URL}/api/chats/${usuarioLogueado._id}`);
                listaChatsGlobal = await res.json();
                renderizarListaLateralHistorial();

                if(listaChatsGlobal.length > 0 && !idChatActivo) {
                    seleccionarConversacionEspecifica(listaChatsGlobal[0]._id);
                } else if(listaChatsGlobal.length === 0) {
                    await crearNuevaConversacion();
                }
            } catch (err) {
                console.error(err);
            }
        }

        function renderizarListaLateralHistorial() {
            const contenedor = document.getElementById('sidebar-dinamico-root');
            if (!contenedor) return;
            
            contenedor.className = "chats-list"; 
            contenedor.innerHTML = "";

            if(listaChatsGlobal.length === 0) {
                contenedor.innerHTML = `<p style="color:var(--texto-secundario); font-size:13px; text-align:center; padding:20px;">No hay chats.</p>`;
                return;
            }

            listaChatsGlobal.forEach(chat => {
                const item = document.createElement('div');
                item.className = `chat-item ${chat._id === idChatActivo ? 'active' : ''}`;
                item.setAttribute('onclick', `seleccionarConversacionEspecifica('${chat._id}')`);
                
                item.innerHTML = `
                    <div class="chat-item-text">${chat.titulo || 'Conversación'}</div>
                    <button class="btn-delete-chat" onclick="event.stopPropagation(); ejecutarBorradoChat('${chat._id}')">🗑️</button>
                `;
                contenedor.appendChild(item);
            });
        }

        async function crearNuevaConversacion() {
            if(!usuarioLogueado) return;
            try {
                const res = await fetch(`${RAILWAY_BACKEND_URL}/api/chats/nuevo`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId: usuarioLogueado._id })
                });
                const nuevoChat = await res.json();
                idChatActivo = nuevoChat._id;
                await recargarHistorialChatsServidor();
            } catch (err) {
                console.error(err);
            }
        }

        function seleccionarConversacionEspecifica(chatId) {
            idChatActivo = chatId;
            const chatSeleccionado = listaChatsGlobal.find(c => c._id === chatId);
            
            const items = document.querySelectorAll('.chat-item');
            items.forEach(el => el.classList.remove('active'));

            const box = document.getElementById('chat-box-messages');
            box.innerHTML = "";

            if(!chatSeleccionado || !chatSeleccionado.mensajes || chatSeleccionado.mensajes.length === 0) {
                box.innerHTML = `<div class="message ai-message">Has iniciado un nuevo chat en GNARTEJ AI.</div>`;
            } else {
                chatSeleccionado.mensajes.forEach(msg => {
                    if (msg.role === 'system') return; 
                    const div = document.createElement('div');
                    div.className = `message ${msg.role === 'user' ? 'user-message' : 'ai-message'}`;
                    div.innerText = msg.content || msg.texto || ""; 
                    box.appendChild(div);
                });
            }
            box.scrollTop = box.scrollHeight;
        }

        async function ejecutarAutenticacion() {
            const userInp = document.getElementById('username-input').value.trim();
            const passInp = document.getElementById('password-input').value.trim();
            if(!userInp || !passInp) return alert("Completa los campos.");

            try {
                let res = await fetch(`${RAILWAY_BACKEND_URL}/api/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: userInp, password: passInp })
                });

                if (res.status === 401) {
                    let resReg = await fetch(`${RAILWAY_BACKEND_URL}/api/auth/register`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ username: userInp, password: passInp })
                    });
                    usuarioLogueado = await resReg.json();
                } else {
                    usuarioLogueado = await res.json();
                }

                localStorage.setItem('gnartej_user', JSON.stringify(usuarioLogueado));
                reestructurarInterfazUsuarioConectado();
                cerrarPantallaCuenta();
                await recargarHistorialChatsServidor();
            } catch (err) {
                alert("Error de autenticación");
            }
        }

        function ejecutarCierreSesion() {
            localStorage.removeItem('gnartej_user');
            usuarioLogueado = null; idChatActivo = null; listaChatsGlobal = [];
            reestructurarInterfazDesconectado();
            cerrarPantallaCuenta();
        }

        async function enviarMensajeUsuario() {
            const inp = document.getElementById('chat-input-field');
            const txt = inp.value.trim();
            if(!txt || !idChatActivo || !usuarioLogueado) return;

            inp.value = "";
            if(document.querySelector('input[name="input-mode"]:checked').value === 'estirar') {
                inp.style.height = '50px';
            }

            const box = document.getElementById('chat-box-messages');
            const userDiv = document.createElement('div');
            userDiv.className = "message user-message";
            userDiv.innerText = txt;
            box.appendChild(userDiv);

            const aiDiv = document.createElement('div');
            aiDiv.className = "message ai-message";
            aiDiv.id = "temp-ai-loader-msg";
            aiDiv.innerText = "Escribiendo...";
            box.appendChild(aiDiv);
            box.scrollTop = box.scrollHeight;

            try {
                const res = await fetch(`${RAILWAY_BACKEND_URL}/api/chat/${idChatActivo}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: txt })
                });
                const data = await res.json();
                document.getElementById('temp-ai-loader-msg').innerText = data.reply;
                document.getElementById('temp-ai-loader-msg').removeAttribute('id');
                await recargarHistorialChatsServidor();
            } catch (err) {
                document.getElementById('temp-ai-loader-msg').innerText = "⚠️ Error de conexión.";
            }
        }

        async function ejecutarBorradoChat(chatId) {
            if(!confirm("¿Borrar chat?")) return;
            try {
                await fetch(`${RAILWAY_BACKEND_URL}/api/chats/${chatId}`, { method: 'DELETE' });
                if(idChatActivo === chatId) idChatActivo = null;
                await recargarHistorialChatsServidor();
            } catch (err) {
                console.error(err);
            }
        }
    </script>
</body>
</html>
