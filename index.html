<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GNARTEJ AI</title>
  <style>
    /* --- VARIABLES PARA LOS TEMAS (CLARO Y OSCURO) --- */
    :root {
      --bg-principal: #0f0f11;
      --bg-chat: #141417;
      --bg-cabecera: #1a1a1f;
      --bg-tarjeta: #141417;
      --bg-item: #141417;
      --bg-item-hover: #1a1a1f;
      --texto-principal: #f1f1f3;
      --texto-secundario: #a1a1aa;
      --borde: #26262f;
      --borde-fuerte: #2e2e38;
      --verde-fosforito: #00ff99;
      --ai-msg-bg: #1a1a1f;
      --ai-msg-texto: #e4e4e7;
      --bg-modal-overlay: rgba(15, 15, 17, 0.96);
      --bg-modal-alerta: rgba(9, 9, 11, 0.9);
    }

    /* Cuando se activa el modo claro */
    [data-theme="claro"] {
      --bg-principal: #f4f4f5;
      --bg-chat: #ffffff;
      --bg-cabecera: #e4e4e7;
      --bg-tarjeta: #ffffff;
      --bg-item: #fafafa;
      --bg-item-hover: #f4f4f5;
      --texto-principal: #09090b;
      --texto-secundario: #71717a;
      --borde: #e4e4e7;
      --borde-fuerte: #d4d4d8;
      --ai-msg-bg: #f4f4f5;
      --ai-msg-texto: #09090b;
      --bg-modal-overlay: rgba(244, 244, 245, 0.96);
      --bg-modal-alerta: rgba(228, 228, 231, 0.9);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      transition: background-color 0.2s ease, color 0.2s ease, border-color 0.2s ease;
    }

    html, body {
      background-color: var(--bg-principal);
      color: var(--texto-principal);
      height: 100vh;
      width: 100%;
      overflow: hidden;
    }

    #loading-screen {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background-color: #0f0f11;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 24px;
      transition: opacity 0.5s ease, transform 0.5s ease;
    }

    .spinner {
      width: 56px; height: 56px;
      border: 4px solid #1f1f24;
      border-top: 4px solid var(--verde-fosforito);
      border-radius: 50%;
      animation: spin 0.8s cubic-bezier(0.4, 0, 0.2, 1) infinite;
      box-shadow: 0 0 15px rgba(0, 255, 153, 0.2);
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .app-container {
      display: flex;
      width: 100%;
      height: 100vh;
      overflow: hidden;
    }

    .chat-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      height: 100%;
      background-color: var(--bg-chat);
      overflow: hidden;
      position: relative;
    }

    .chat-header {
      background-color: var(--bg-cabecera);
      padding: 0 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--borde);
      height: 65px;
      flex-shrink: 0;
    }

    .chat-header h2 {
      color: var(--verde-fosforito);
      font-size: 19px;
      font-weight: 600;
      letter-spacing: 0.5px;
    }

    .header-buttons-container {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .chat-status-badge {
      background-color: var(--bg-principal);
      color: var(--texto-principal);
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid var(--borde-fuerte);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .chat-status-badge:hover {
      background-color: var(--bg-item-hover);
      border-color: var(--verde-fosforito);
    }

    .btn-historial-header {
      background-color: var(--bg-principal);
      color: var(--verde-fosforito);
      border: 1px solid var(--borde-fuerte);
      padding: 8px 16px;
      border-radius: 20px;
      cursor: pointer;
      font-weight: 600;
      font-size: 13px;
    }

    .btn-historial-header:hover {
      background-color: var(--bg-item-hover);
      border-color: var(--verde-fosforito);
    }

    .chat-messages {
      flex: 1;
      padding: 24px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 16px;
      width: 100%;
      max-width: 100%;
      -webkit-overflow-scrolling: touch;
    }

    .message {
      padding: 14px 18px;
      border-radius: 16px;
      max-width: 75%;
      word-wrap: break-word;
      overflow-wrap: break-word;
      white-space: pre-wrap;
      line-height: 1.5;
      font-size: 15px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      animation: messageFadeIn 0.3s ease;
    }

    @keyframes messageFadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .user-message {
      background-color: var(--verde-fosforito);
      color: #000000 !important;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
      font-weight: 500;
    }

    .ai-message {
      background-color: var(--ai-msg-bg);
      color: var(--ai-msg-texto);
      align-self: flex-start;
      border-bottom-left-radius: 4px;
      border: 1px solid var(--borde);
    }

    .chat-input-container {
      padding: 16px 24px;
      background-color: var(--bg-cabecera);
      display: flex;
      gap: 12px;
      border-top: 1px solid var(--borde);
      width: 100%;
      flex-shrink: 0;
    }

    .chat-input-container input {
      flex: 1;
      padding: 14px 18px;
      border-radius: 12px;
      border: 1px solid var(--borde);
      background-color: var(--bg-chat);
      color: var(--texto-principal);
      font-size: 15px;
      outline: none;
    }

    .chat-input-container input:focus {
      border-color: var(--verde-fosforito);
    }

    .chat-input-container button {
      background-color: var(--verde-fosforito);
      color: #09090b;
      border: none;
      padding: 0 24px;
      border-radius: 12px;
      font-weight: 600;
      cursor: pointer;
      font-size: 15px;
    }

    .chat-input-container button:hover:not(:disabled) {
      background-color: #00e680;
    }
    
    .chat-input-container button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
  </style>
</head>
<body>

  <div id="loading-screen">
    <div class="spinner"></div>
    <h3 style="color: white; font-weight: 400; letter-spacing: 1px;">Iniciando GNARTEJ AI...</h3>
  </div>

  <div class="app-container">
    <div class="chat-area">
      <div class="chat-header">
        <h2>GNARTEJ AI Core</h2>
        <div class="header-buttons-container">
          <div class="chat-status-badge" id="theme-toggle" onclick="toggleTema()">🌓 Cambiar Tema</div>
          <button class="btn-historial-header" onclick="nuevoChat()">🗑️ Limpiar Pantalla</button>
        </div>
      </div>

      <div class="chat-messages" id="chatBox">
        <div class="message ai-message">¡Hola, Gonzalo! El sistema Serverless está completamente optimizado y listo. ¿De qué te gustaría hablar hoy?</div>
      </div>

      <div class="chat-input-container">
        <input type="text" id="userInput" placeholder="Escribe un mensaje aquí..." onkeypress="evaluarEnter(event)">
        <button id="btnEnviar" onclick="enviarMensaje()">Enviar</button>
      </div>
    </div>
  </div>

  <script>
    // CAMBIA ESTO POR LA URL DE TU PROPIO BACKEND DE VERCEL CUANDO HAGAS EL DEPLOY
    const API_BASE_URL = 'https://tu-api.vercel.app'; 
    let chatIdActual = null;
    let userIdTemporal = "663eb4f8fe90a82b4f800001"; // ID de fallback para simular sesión activa

    // FUNCIÓN CRÍTICA PARA REMOVER LA PANTALLA DE CARGA AL INICIAR
    window.addEventListener('DOMContentLoaded', () => {
      const loader = document.getElementById('loading-screen');
      setTimeout(() => {
        loader.style.opacity = '0';
        setTimeout(() => loader.remove(), 500);
      }, 800); // Pequeño delay de suavizado visual
    });

    function evaluarEnter(e) {
      if (e.key === 'Enter') enviarMensaje();
    }

    function toggleTema() {
      const currentTheme = document.documentElement.getAttribute('data-theme');
      if (currentTheme === 'claro') {
        document.documentElement.removeAttribute('data-theme');
      } else {
        document.documentElement.setAttribute('data-theme', 'claro');
      }
    }

    async function nuevoChat() {
      try {
        const res = await fetch(`${API_BASE_URL}/api/chats/nuevo`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ userId: userIdTemporal })
        });
        if (res.ok) {
          const data = await res.json();
          chatIdActual = data._id;
          document.getElementById('chatBox').innerHTML = '<div class="message ai-message">Nueva conversación limpia iniciada con éxito.</div>';
        }
      } catch (err) {
        console.error("Error al crear chat, usando modo local:", err);
        document.getElementById('chatBox').innerHTML = '<div class="message ai-message">Se limpió la pantalla (Modo local sin persistencia).</div>';
      }
    }

    async function enviarMensaje() {
      const input = document.getElementById('userInput');
      const texto = input.value.trim();
      if (!texto) return;

      // Renderizar mensaje de usuario
      const chatBox = document.getElementById('chatBox');
      const userDiv = document.createElement('div');
      userDiv.className = 'message user-message';
      userDiv.textContent = texto;
      chatBox.appendChild(userDiv);
      
      input.value = '';
      chatBox.scrollTop = chatBox.scrollHeight;

      // Bloquear entrada mientras responde
      const btnEnviar = document.getElementById('btnEnviar');
      input.disabled = true;
      btnEnviar.disabled = true;

      // Burbuja de carga de la IA
      const aiDiv = document.createElement('div');
      aiDiv.className = 'message ai-message';
      aiDiv.textContent = 'Pensando...';
      chatBox.appendChild(aiDiv);
      chatBox.scrollTop = chatBox.scrollHeight;

      // Si no hay ID de chat asignado, intentamos crear uno rápido
      if (!chatIdActual) {
        chatIdActual = "663eb528fe90a82b4f800002"; // ID por defecto para pruebas rápidas
      }

      try {
        const respuesta = await fetch(`${API_BASE_URL}/api/chat/${chatIdActual}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: texto })
        });

        if (respuesta.ok) {
          const data = await respuesta.json();
          aiDiv.textContent = data.reply;
        } else {
          aiDiv.textContent = 'Error: El servidor de Vercel ha devuelto un fallo al procesar Mistral.';
        }
      } catch (error) {
        console.error("Error de conexión:", error);
        aiDiv.textContent = 'No se ha podido conectar con la API de Vercel. Asegúrate de actualizar la URL en el código.';
      } finally {
        input.disabled = false;
        btnEnviar.disabled = false;
        input.focus();
        chatBox.scrollTop = chatBox.scrollHeight;
      }
    }
  </script>
</body>
</html>
