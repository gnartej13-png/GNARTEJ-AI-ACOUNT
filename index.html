<!DOCTYPE html>
<html lang="es" data-theme="oscuro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GNARTEJ AI</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        /* --- VARIABLES PARA LOS TEMAS (CLARO Y OSCURO) --- */
        :root {
            --bg-principal: #0f0f11;
            --bg-chat: #141417;
            --bg-cabecera: #1a1a1f;
            --bg-tarjeta: #141417;
            --bg-item: #141417;
            --bg-item-hover: #1a1a1f;
            --texto-principal: #f1f1f3;
            --texto-secundario: #a1a1aa;
            --borde: #26262f;
            --borde-fuerte: #2e2e38;
            --verde-fosforito: #00ff99;
            --ai-msg-bg: #1a1a1f;
            --ai-msg-texto: #e4e4e7;
            --bg-modal-overlay: rgba(15, 15, 17, 0.96);
            --bg-modal-alerta: rgba(9, 9, 11, 0.9);
        }

        [data-theme="claro"] {
            --bg-principal: #f4f4f5;
            --bg-chat: #ffffff;
            --bg-cabecera: #e4e4e7;
            --bg-tarjeta: #ffffff;
            --bg-item: #fafafa;
            --bg-item-hover: #f4f4f5;
            --texto-principal: #09090b;
            --texto-secundario: #71717a;
            --borde: #e4e4e7;
            --borde-fuerte: #d4d4d8;
            --ai-msg-bg: #f4f4f5;
            --ai-msg-texto: #09090b;
            --bg-modal-overlay: rgba(244, 244, 245, 0.96);
            --bg-modal-alerta: rgba(228, 228, 231, 0.9);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            transition: background-color 0.2s ease, color 0.2s ease, border-color 0.2s ease;
        }

        html, body {
            background-color: var(--bg-principal);
            color: var(--texto-principal);
            height: 100vh;
            width: 100%;
            overflow: hidden;
        }

        /* --- PANTALLA DE CARGA --- */
        #loading-screen {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-color: #0f0f11;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 24px;
            transition: opacity 0.5s ease;
        }

        .spinner {
            width: 56px; height: 56px;
            border: 4px solid #1f1f24;
            border-top: 4px solid var(--verde-fosforito);
            border-radius: 50%;
            animation: spin 0.8s cubic-bezier(0.4, 0, 0.2, 1) infinite;
            box-shadow: 0 0 15px rgba(0, 255, 153, 0.2);
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* --- CONTENEDOR DE LA APLICACIÓN --- */
        .app-container {
            display: flex;
            width: 100%;
            height: 100vh;
            overflow: hidden;
        }

        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100%;
            background-color: var(--bg-chat);
            overflow: hidden;
            position: relative;
        }

        .chat-header {
            background-color: var(--bg-cabecera);
            padding: 0 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--borde);
            height: 65px;
            flex-shrink: 0;
        }

        .chat-header h2 {
            color: var(--verde-fosforito);
            font-size: 19px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .header-buttons-container {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .chat-status-badge {
            background-color: var(--bg-principal);
            color: var(--texto-principal);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            border: 1px solid var(--borde-fuerte);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .chat-status-badge:hover {
            background-color: var(--bg-item-hover);
            border-color: var(--verde-fosforito);
        }

        .btn-historial-header {
            background-color: var(--bg-principal);
            color: var(--verde-fosforito);
            border: 1px solid var(--borde-fuerte);
        }

        /* --- ÁREA DE MENSAJES --- */
        .chat-messages {
            flex: 1;
            padding: 24px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
            width: 100%;
        }

        .message {
            padding: 14px 18px;
            border-radius: 16px;
            max-width: 75%;
            word-wrap: break-word;
            overflow-wrap: break-word;
            white-space: pre-wrap;
            line-height: 1.5;
            font-size: 15px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            animation: messageFadeIn 0.3s ease;
        }

        @keyframes messageFadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .user-message {
            background-color: var(--verde-fosforito);
            color: #000000 !important;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
            font-weight: 500;
        }

        .ai-message {
            background-color: var(--ai-msg-bg);
            color: var(--ai-msg-texto);
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            border: 1px solid var(--borde);
        }

        /* --- CONTENEDOR DE ENTRADA --- */
        .chat-input-container {
            padding: 16px 24px;
            background-color: var(--bg-cabecera);
            display: flex;
            gap: 12px;
            border-top: 1px solid var(--borde);
            width: 100%;
            flex-shrink: 0;
        }

        .chat-input-container input {
            flex: 1;
            padding: 14px 18px;
            border-radius: 12px;
            border: 1px solid var(--borde);
            background-color: var(--bg-chat);
            color: var(--texto-principal);
            font-size: 15px;
            outline: none;
        }

        .chat-input-container input:focus {
            border-color: var(--verde-fosforito);
        }

        .chat-input-container button {
            background-color: var(--verde-fosforito);
            color: #09090b;
            border: none;
            padding: 0 24px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            font-size: 15px;
        }

        .chat-input-container button:hover:not(:disabled) {
            background-color: #00e680;
        }

        .chat-input-container input:disabled, .chat-input-container button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        /* --- BARRA LATERAL DERECHA (CHATS) --- */
        .sidebar-right {
            width: 300px;
            background-color: var(--bg-principal);
            border-left: 1px solid var(--borde);
            display: flex;
            flex-direction: column;
            height: 100%;
            flex-shrink: 0;
        }

        .sidebar-header {
            padding: 16px;
            border-bottom: 1px solid var(--borde);
        }

        .btn-nuevo-chat {
            width: 100%;
            padding: 12px;
            background-color: transparent;
            color: var(--verde-fosforito);
            border: 1px dashed rgba(0, 255, 153, 0.4);
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            text-align: center;
        }

        .btn-nuevo-chat:hover:not(:disabled) {
            background-color: rgba(0, 255, 153, 0.05);
            border-color: var(--verde-fosforito);
        }

        .chats-list {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .chat-item {
            padding: 14px;
            background-color: var(--bg-cabecera);
            border-radius: 10px;
            cursor: pointer;
            font-size: 14.5px;
            border: 1px solid var(--borde);
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
        }

        .chat-item:hover, .chat-item.active {
            background-color: var(--bg-item-hover);
            border-color: var(--verde-fosforito);
        }

        .chat-item-text {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex: 1;
        }

        .btn-delete-chat {
            background: none;
            border: none;
            color: #71717a;
            cursor: pointer;
            font-size: 14px;
        }

        .btn-delete-chat:hover {
            color: #ef4444;
        }

        /* --- VENTANAS MODALES --- */
        .modal-screen {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-color: var(--bg-modal-overlay);
            z-index: 1000;
            padding: 20px;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .account-card {
            background-color: var(--bg-cabecera);
            border: 1px solid var(--borde);
            border-radius: 20px;
            width: 100%;
            max-width: 440px;
            padding: 32px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .login-box-inside {
            background: var(--bg-chat);
            padding: 20px;
            border-radius: 14px;
            border: 1px solid var(--borde);
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .login-box-inside label {
            font-size: 13px;
            color: var(--texto-secundario);
            font-weight: 500;
        }

        .login-box-inside input {
            padding: 12px;
            border-radius: 8px;
            border: 1px solid var(--borde);
            background: var(--bg-principal);
            color: var(--texto-principal);
            outline: none;
            font-size: 14.5px;
        }

        .password-container {
            display: flex;
            position: relative;
            align-items: center;
        }

        .password-container input {
            width: 100%;
            padding-right: 45px;
        }

        .btn-toggle-password {
            position: absolute;
            right: 12px;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 16px;
        }

        #btn-login-action {
            margin-top: 8px;
            padding: 14px;
            background-color: var(--verde-fosforito);
            color: #000;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            font-size: 15px;
        }

        .btn-volver {
            background: transparent;
            border: 1px solid var(--borde-fuerte);
            color: var(--texto-secundario);
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            font-size: 14px;
        }

        .btn-volver:hover {
            color: var(--texto-principal);
            background: var(--bg-item-hover);
        }

        .zona-usuario-activa {
            text-align: center;
            padding: 10px 0;
        }

        .btn-logout-panel {
            width: 100%;
            padding: 14px;
            background-color: #ef4444;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            font-size: 15px;
        }
    </style>
</head>
<body>

    <div id="loading-screen">
        <div class="spinner"></div>
        <h2 style="color: #00ff99; font-size: 18px; font-weight: 500; text-align: center; padding: 0 20px;" id="loading-text">
            Conectando con GNARTEJ API en Vercel...
        </h2>
    </div>

    <div id="account-screen" class="modal-screen">
        <div class="account-card">
            <div id="zona-login-registro">
                <h2 style="color: #00ff99; font-size: 20px; text-align: center; margin-bottom: 5px;">Vincular Cuenta (Vercel)</h2>
                <p style="color: #aaa; font-size: 13px; text-align: center; margin-bottom: 15px;">
                    Introduce tus credenciales para conectar. Si no existes, el sistema te registrará automáticamente.
                </p>
                <div class="login-box-inside">
                    <label>Usuario:</label>
                    <input type="text" id="username-input" placeholder="Tu usuario...">
                    
                    <label>Contraseña:</label>
                    <div class="password-container">
                        <input type="password" id="password-input" placeholder="Tu contraseña...">
                        <button type="button" class="btn-toggle-password" onclick="alternarVisibilidadPassword()">🙈</button>
                    </div>
                    
                    <button id="btn-login-action" onclick="conectarCuentaNube()">Autenticar en Vercel</button>
                </div>
            </div>

            <div id="zona-logout" style="display: none;" class="zona-usuario-activa">
                <h2 style="color: #00ff99; font-size: 22px; margin-bottom: 15px;" id="menu-user-title">Usuario</h2>
                <button class="btn-logout-panel" onclick="cerrarSesionNube()">Cerrar Sesión</button>
            </div>
            
            <button class="btn-volver" onclick="cerrarPantallaCuenta()">Cerrar Ventana</button>
        </div>
    </div>

    <div class="app-container">
        <div class="chat-area">
            <div class="chat-header">
                <h2>GNARTEJ AI</h2>
                <div class="header-buttons-container">
                    <div class="chat-status-badge btn-historial-header" id="btn-historial-top" onclick="abrirPantallaHistorial()" style="display: none;">💬 Historial</div>
                    <div class="chat-status-badge" id="status-badge" onclick="abrirPantallaCuenta()" style="color: #ff3333; border-color: #ff3333;">🔒 Conectar Cuenta</div>
                </div>
            </div>

            <div class="chat-messages" id="chat-box"></div>

            <div class="chat-input-container">
                <input type="text" id="user-input" placeholder="Requiere cuenta activa..." disabled onkeypress="evaluarTeclado(event)">
                <button id="send-btn" onclick="enviarMensaje()" disabled>Enviar</button>
            </div>
        </div>

        <div class="sidebar-right" id="sidebar-conversaciones">
            <div class="sidebar-header">
                <button class="btn-nuevo-chat" id="sidebar-newchat-btn" onclick="crearNuevoChat()" disabled>+ Nuevo Chat</button>
            </div>
            <div class="chats-list" id="lista-chats"></div>
        </div>
    </div>

    <div id="history-screen" class="modal-screen">
        <div class="account-card" style="max-width: 460px;">
            <h2 style="color: #00ff99; font-size: 20px; text-align: center;">📂 Historial de Conversaciones</h2>
            <button class="btn-nuevo-chat" id="modal-newchat-btn" onclick="crearNuevoChat(); cerrarPantallaHistorial();" style="margin-top:10px;">+ Crear Nueva Conversación</button>
            <div class="chats-list" id="lista-chats-modal" style="max-height: 300px; overflow-y: auto; margin-top:10px;"></div>
            <button class="btn-volver" onclick="cerrarPantallaHistorial()">Volver al Chat</button>
        </div>
    </div>

    <script>
        // URL de tu API en Vercel ya configurada
        const VERCEL_BACKEND_URL = "https://gnartej-api.vercel.app"; 

        let usuarioLogueado = null;
        let listaConversaciones = [];
        let chatActivoId = null;

        window.onload = async function() {
            try {
                const response = await fetch(`${VERCEL_BACKEND_URL}/health`);
                const data = await response.json();
                
                if (data.status === "ok") {
                    document.getElementById('loading-screen').style.opacity = '0';
                    setTimeout(() => {
                        document.getElementById('loading-screen').style.display = 'none';
                    }, 500);
                    
                    const sesionGuardada = localStorage.getItem('usuario_gnartej_ai');
                    if (sesionGuardada) {
                        usuarioLogueado = JSON.parse(sesionGuardada);
                        actualizarInterfazUsuarioLogueado();
                        await cargarHistorialChatsServidor();
                    }
                } else {
                    marcarErrorCargaBackend();
                }
            } catch (error) {
                console.error("Error conectando con Vercel:", error);
                marcarErrorCargaBackend();
            }
        };

        function marcarErrorCargaBackend() {
            document.getElementById('loading-text').innerText = "Error de comunicación. Asegúrate de configurar las variables de entorno en Vercel y que la URL sea la correcta.";
            document.getElementById('loading-text').style.color = "#ff3333";
            const spinner = document.querySelector('.spinner');
            if (spinner) spinner.style.borderTopColor = "#ff3333";
        }

        function abrirPantallaCuenta() { document.getElementById('account-screen').style.display = 'flex'; }
        function cerrarPantallaCuenta() { document.getElementById('account-screen').style.display = 'none'; }
        function abrirPantallaHistorial() { document.getElementById('history-screen').style.display = 'flex'; }
        function cerrarPantallaHistorial() { document.getElementById('history-screen').style.display = 'none'; }

        function alternarVisibilidadPassword() {
            const input = document.getElementById('password-input');
            const btn = document.querySelector('.btn-toggle-password');
            if (input.type === "password") {
                input.type = "text";
                btn.innerText = "🐵";
            } else {
                input.type = "password";
                btn.innerText = "🙈";
            }
        }

        async function conectarCuentaNube() {
            const usernameInput = document.getElementById('username-input').value.trim();
            const passwordInput = document.getElementById('password-input').value.trim();

            if (!usernameInput || !passwordInput) {
                alert("Por favor, rellena los campos.");
                return;
            }

            const btnAction = document.getElementById('btn-login-action');
            btnAction.innerText = "Conectando...";
            btnAction.disabled = true;

            try {
                let response = await fetch(`${VERCEL_BACKEND_URL}/api/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: usernameInput, password: passwordInput })
                });

                if (response.status === 401) {
                    let regResponse = await fetch(`${VERCEL_BACKEND_URL}/api/auth/register`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ username: usernameInput, password: passwordInput })
                    });

                    if (regResponse.ok) {
                        const nuevoUser = await regResponse.json();
                        alert("¡Cuenta registrada con éxito en Vercel!");
                        guardarYActivarSesion(nuevoUser);
                    } else {
                        const errorData = await regResponse.json();
                        alert(`Error: ${errorData.error}`);
                    }
                } else if (response.ok) {
                    const userLogged = await response.json();
                    guardarYActivarSesion(userLogged);
                } else {
                    alert("Error devuelto por el servidor.");
                }
            } catch (err) {
                console.error(err);
                alert("Error de red. Revisa la configuración de enrutamiento o CORS.");
            } finally {
                btnAction.innerText = "Autenticar en Vercel";
                btnAction.disabled = false;
            }
        }

        function guardarYActivarSesion(usuario) {
            usuarioLogueado = usuario;
            localStorage.setItem('usuario_gnartej_ai', JSON.stringify(usuario));
            actualizarInterfazUsuarioLogueado();
            cerrarPantallaCuenta();
            cargarHistorialChatsServidor();
        }

        function actualizarInterfazUsuarioLogueado() {
            if (usuarioLogueado) {
                document.getElementById('status-badge').innerHTML = `● Conectado: ${usuarioLogueado.name || usuarioLogueado.username}`;
                document.getElementById('status-badge').style.color = "#00ff99";
                document.getElementById('status-badge').style.borderColor = "#00ff99";
                
                document.getElementById('user-input').disabled = false;
                document.getElementById('user-input').placeholder = "Pregunta lo que quieras a GNARTEJ AI...";
                document.getElementById('send-btn').disabled = false;
                document.getElementById('sidebar-newchat-btn').disabled = false;
                document.getElementById('btn-historial-top').style.display = 'flex';
                
                document.getElementById('zona-login-registro').style.display = 'none';
                document.getElementById('zona-logout').style.display = 'block';
                document.getElementById('menu-user-title').innerText = `Usuario: ${usuarioLogueado.username}`;
            }
        }

        function cerrarSesionNube() {
            localStorage.removeItem('usuario_gnartej_ai');
            location.reload();
        }

        async function cargarHistorialChatsServidor() {
            if (!usuarioLogueado) return;
            try {
                const response = await fetch(`${VERCEL_BACKEND_URL}/api/chats/${usuarioLogueado._id}`);
                listaConversaciones = await response.json();
                renderizarListaChatsLateral();

                if (listaConversaciones.length > 0) {
                    cambiarDeChatActivo(listaConversaciones[0]._id);
                } else {
                    await crearNuevoChat();
                }
            } catch (error) {
                console.error("Error cargando historial de chats:", error);
            }
        }

        async function crearNuevoChat() {
            if (!usuarioLogueado) return;
            try {
                const response = await fetch(`${VERCEL_BACKEND_URL}/api/chats/nuevo`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId: usuarioLogueado._id })
                });
                const nuevoChat = await response.json();
                listaConversaciones.unshift(nuevoChat);
                renderizarListaChatsLateral();
                cambiarDeChatActivo(nuevoChat._id);
            } catch (error) {
                console.error(error);
            }
        }

        function renderizarListaChatsLateral() {
            const contenedorLateral = document.getElementById('lista-chats');
            const contenedorModal = document.getElementById('lista-chats-modal');
            let htmlContenido = "";

            listaConversaciones.forEach(chat => {
                const activeClass = chat._id === chatActivoId ? "active" : "";
                htmlContenido += `
                    <div class="chat-item ${activeClass}" onclick="cambiarDeChatActivo('${chat._id}')">
                        <div class="chat-item-text">📝 ${chat.titulo}</div>
                        <button class="btn-delete-chat" onclick="eliminarConversacionChat(event, '${chat._id}')">
                            <i class="fa-solid fa-trash"></i>
                        </button>
                    </div>
                `;
            });

            contenedorLateral.innerHTML = htmlContenido;
            contenedorModal.innerHTML = htmlContenido;
        }

        function cambiarDeChatActivo(chatId) {
            chatActivoId = chatId;
            renderizarListaChatsLateral();
            
            const chatObj = listaConversaciones.find(c => c._id === chatId);
            const chatBox = document.getElementById('chat-box');
            chatBox.innerHTML = "";

            if (chatObj && chatObj.mensajes) {
                chatObj.mensajes.forEach(msg => {
                    inyectarBurbujaMensaje(msg.content, msg.role === 'user');
                });
            }
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        async function eliminarConversacionChat(event, chatId) {
            event.stopPropagation();
            if (!confirm("¿Deseas eliminar este chat?")) return;

            try {
                const response = await fetch(`${VERCEL_BACKEND_URL}/api/chats/${chatId}`, { method: 'DELETE' });
                if (response.ok) {
                    listaConversaciones = listaConversaciones.filter(c => c._id !== chatId);
                    renderizarListaChatsLateral();
                    
                    if (chatActivoId === chatId) {
                        if (listaConversaciones.length > 0) {
                            cambiarDeChatActivo(listaConversaciones[0]._id);
                        } else {
                            await crearNuevoChat();
                        }
                    }
                }
            } catch (error) {
                console.error(error);
            }
        }

        function evaluarTeclado(event) {
            if (event.key === 'Enter') enviarMensaje();
        }

        async function enviarMensaje() {
            const inputElement = document.getElementById('user-input');
            const mensajeTexto = inputElement.value.trim();

            if (!mensajeTexto || !chatActivoId) return;

            inyectarBurbujaMensaje(mensajeTexto, true);
            inputElement.value = "";

            inputElement.disabled = true;
            document.getElementById('send-btn').disabled = true;

            const chatBox = document.getElementById('chat-box');
            const loadBurbuja = document.createElement('div');
            loadBurbuja.className = "message ai-message";
            loadBurbuja.id = "loader-ia-msg";
            loadBurbuja.innerText = "Pensando...";
            chatBox.appendChild(loadBurbuja);
            chatBox.scrollTop = chatBox.scrollHeight;

            try {
                const response = await fetch(`${VERCEL_BACKEND_URL}/api/chat/preguntar`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chatId: chatActivoId, mensajeUsuario: mensajeTexto })
                });

                const data = await response.json();
                
                const loader = document.getElementById('loader-ia-msg');
                if (loader) loader.remove();

                if (response.ok) {
                    inyectarBurbujaMensaje(data.respuesta, false);
                    
                    const index = listaConversaciones.findIndex(c => c._id === chatActivoId);
                    if (index !== -1) {
                        listaConversaciones[index] = data.chatActualizado;
                        renderizarListaChatsLateral();
                    }
                } else {
                    inyectarBurbujaMensaje(`Error: ${data.error}`, false);
                }
            } catch (error) {
                const loader = document.getElementById('loader-ia-msg');
                if (loader) loader.remove();
                inyectarBurbujaMensaje("Error al conectar con Vercel.", false);
            } finally {
                inputElement.disabled = false;
                document.getElementById('send-btn').disabled = false;
                inputElement.focus();
            }
        }

        function inyectarBurbujaMensaje(texto, esUsuario) {
            const chatBox = document.getElementById('chat-box');
            const bubble = document.createElement('div');
            bubble.className = esUsuario ? "message user-message" : "message ai-message";
            bubble.innerText = texto;
            chatBox.appendChild(bubble);
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    </script>
</body>
</html>
